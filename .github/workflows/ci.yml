name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: questdb
          POSTGRES_USER: questuser
          POSTGRES_PASSWORD: questpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U questuser -d questdb"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:ci
        env:
          TEST_DATABASE_URL: postgres://questuser:questpass@localhost:5432/questdb

      - name: Build app
        run: npm run build

      - name: Build Docker image
        run: docker build -t quests-app-ci .
