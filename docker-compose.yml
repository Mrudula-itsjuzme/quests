services:
  app:
    build: .
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DATABASE_URL: postgres://questuser:questpass@db:5432/questdb
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: questdb
      POSTGRES_USER: questuser
      POSTGRES_PASSWORD: questpass
    ports:
      - "5432:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U questuser -d questdb"]
      interval: 10s
      timeout: 5s
      retries: 5
